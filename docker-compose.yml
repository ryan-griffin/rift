services:
    database:
        image: docker.io/library/postgres:latest
        volumes:
            - db_data:/var/lib/postgresql
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    api:
        image: ghcr.io/ryan-griffin/rift/api:latest
        environment:
            DATABASE_URL: postgres://postgres@database
            JWT_SECRET: ${JWT_SECRET}
            API_HOST: api
            API_PORT: 8080
            APP_HOST: app
            APP_PORT: 8080
        ports:
            - "${BIND_HOST}:${BIND_PORT}:8080"
        depends_on:
            database:
                condition: service_healthy
        restart: unless-stopped

    app:
        image: ghcr.io/ryan-griffin/rift/app:latest
        environment:
            HOST: app
            PORT: 8080
            API_HOST: ${API_HOST}
            API_PORT: 8080
            API_INTERNAL_HOST: api
            BIND_HOST: ${BIND_HOST}
            BIND_PORT: ${BIND_PORT}
        depends_on:
            api:
                condition: service_started
        restart: unless-stopped

volumes:
    db_data:

services:
    database:
        image: docker.io/library/postgres:latest
        volumes:
            - db_data:/var/lib/postgresql
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    api:
        image: ghcr.io/ryan-griffin/rift/api:latest
        env_file:
            - .env
        environment:
            DATABASE_URL: postgres://postgres@database
            API_HOST: 0.0.0.0
            APP_HOST: app
        ports:
            - "${API_PORT}:${API_PORT}"
        depends_on:
            database:
                condition: service_healthy
        restart: unless-stopped

    app:
        image: ghcr.io/ryan-griffin/rift/app:latest
        environment:
            HOST: app
            PORT: ${APP_PORT}
        depends_on:
            api:
                condition: service_started
        restart: unless-stopped

volumes:
    db_data:
